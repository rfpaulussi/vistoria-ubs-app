<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vistoria UBS - Sistema Volante</title>
    <!-- Carregamento do Tailwind CSS via CDN para garantir o visual sem configurações complexas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Estilos utilitários para uma melhor experiência mobile */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Garantir que o corpo da página ocupe toda a altura */
      body {
        margin: 0;
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="bg-slate-50">
    <!-- O React irá montar a aplicação dentro desta div -->
    <div id="root"></div>
    
    <!-- Este script é o ponto de ligação com o ficheiro main.jsx na pasta src -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
